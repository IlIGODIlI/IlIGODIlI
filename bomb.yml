name: Update Commit Bomb Calendar

on:
  schedule:
    - cron: "0 0 * * *"   # once a day at 00:00 UTC
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate bomb SVG
        env:
          GH_TOKEN: ${{ secrets.BOMB_TOKEN }}
          GH_USERNAME: IlIGODIlI
        run: node scripts/generate-bomb-svg.js

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update commit bomb calendar"
          file_pattern: dist/bomb-commits.svg

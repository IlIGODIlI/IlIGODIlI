<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Me — Typing Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: #050816;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 20px;
  }

  /* Square Widget Container */
  .about-widget {
    width: 220px;
    height: 220px;
    background-color: #0b0f19;
    border: 1px solid rgba(0, 229, 255, 0.08);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 16px 36px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
    position: relative;
    overflow: hidden;
  }

  /* Text Typing Area styling */
  .text-type-container {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .text-type {
    font-family: 'Outfit', sans-serif;
    font-size: 1.05rem; /* Increased font size */
    line-height: 1.5;
    color: #c9d1d9;
    font-weight: 400;
    white-space: pre-wrap;
    display: inline-block;
    text-align: left;
  }

  .text-type__cursor {
    margin-left: 2px;
    display: inline-block;
    color: #00E5FF;
    font-weight: 700;
    opacity: 1;
  }
</style>
</head>
<body>

  <!-- Square Profile Widget -->
  <div class="about-widget">
    <div class="text-type-container">
      <div class="text-type">
        <span id="typing-text"></span><span class="text-type__cursor" id="cursor">|</span>
      </div>
    </div>
  </div>

  <!-- GSAP Library for typing cursor blink -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    const textEl = document.getElementById('typing-text');
    const cursorEl = document.getElementById('cursor');

    // Bio texts to loop through
    const texts = [
      "AI enthusiast, backend developer, and lifelong learner driven by curiosity and impact.",
      "Creating projects that challenge me, teach me, and hopefully help others."
    ];

    let currentTextIndex = 0;
    let currentCharIndex = 0;
    let isDeleting = false;
    let typingSpeed = 60; // ms per character
    let deletingSpeed = 25; // ms per character
    let pauseDuration = 2200; // pause at sentence end

    // Cursor Blink animation via GSAP
    gsap.to(cursorEl, {
      opacity: 0,
      duration: 0.5,
      repeat: -1,
      yoyo: true,
      ease: 'power2.inOut'
    });

    function tick() {
      const currentFullText = texts[currentTextIndex];

      if (isDeleting) {
        // Deleting characters
        textEl.textContent = currentFullText.slice(0, currentCharIndex - 1);
        currentCharIndex--;

        if (currentCharIndex === 0) {
          isDeleting = false;
          currentTextIndex = (currentTextIndex + 1) % texts.length;
          setTimeout(tick, 500); // Small pause before typing next
        } else {
          setTimeout(tick, deletingSpeed);
        }
      } else {
        // Typing characters
        textEl.textContent = currentFullText.slice(0, currentCharIndex + 1);
        currentCharIndex++;

        if (currentCharIndex === currentFullText.length) {
          isDeleting = true;
          setTimeout(tick, pauseDuration); // Hold text before deleting
        } else {
          setTimeout(tick, typingSpeed);
        }
      }
    }

    // Start typing loop
    setTimeout(tick, 800);
  </script>
</body>
</html>

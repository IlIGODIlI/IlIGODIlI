<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7-Segment Digital Clock — IST</title>
<meta name="description" content="An interactive 7-segment LED digital clock displaying Indian Standard Time in real-time.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: #050811;
    color: #e2e8f0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Futuristic background mesh & glow */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 20% 30%, rgba(0, 229, 255, 0.05) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0, 229, 255, 0.03) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, #070e1e 0%, #050811 70%);
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(18, 24, 38, 0.1) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(18, 24, 38, 0.1) 1px, transparent 1px);
    background-size: 20px 20px;
    z-index: 1;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 560px;
    padding: 24px;
    text-align: center;
  }

  /* Main Bezel Chassis */
  .bezel {
    background: rgba(11, 15, 25, 0.65);
    border: 1px solid rgba(0, 229, 255, 0.08);
    border-radius: 16px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 40px 32px;
    box-shadow: 
      0 24px 64px rgba(0, 0, 0, 0.6),
      0 0 40px rgba(0, 229, 255, 0.02),
      inset 0 1px 0 rgba(255, 255, 255, 0.03);
    position: relative;
    overflow: hidden;
  }

  .bezel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.25), transparent);
  }

  /* Scanline effect */
  .scanline {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 95%, rgba(0, 229, 255, 0.03) 98%, transparent 100%);
    background-size: 100% 200%;
    animation: scan 8s linear infinite;
    pointer-events: none;
    z-index: 5;
  }

  @keyframes scan {
    0% { background-position: 0 0; }
    100% { background-position: 0 200%; }
  }

  /* Header Section */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 12px;
  }

  .title {
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: #00E5FF;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: monospace;
    font-size: 0.75rem;
    color: #00E5FF;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background-color: #00E5FF;
    border-radius: 50%;
    box-shadow: 0 0 8px #00E5FF;
    animation: breathe 2s infinite ease-in-out;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* 7-Segment Clock Display Panel */
  .display-panel {
    background: #020408;
    border: 1px solid rgba(0, 229, 255, 0.04);
    border-radius: 12px;
    padding: 36px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    position: relative;
  }

  /* Digit SVG Container */
  .digit-container {
    width: 48px;
    height: 78px;
  }

  .digit-container svg {
    width: 100%;
    height: 100%;
  }

  /* Segments styling */
  .seg {
    transition: fill 0.15s ease, filter 0.15s ease, opacity 0.15s ease;
  }

  .seg.dim {
    fill: #06111a;
    opacity: 0.12;
  }

  .seg.lit {
    fill: #00E5FF;
    opacity: 1;
    filter: drop-shadow(0 0 4px #00E5FF) drop-shadow(0 0 10px rgba(0, 229, 255, 0.6));
  }

  /* Colon dots */
  .colon-container {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    height: 48px;
    width: 10px;
    align-items: center;
  }

  .colon-dot {
    width: 5px;
    height: 5px;
    background-color: #00E5FF;
    border-radius: 50%;
    box-shadow: 0 0 8px #00E5FF;
    transition: opacity 0.2s ease;
  }

  .colon-dot.blink {
    animation: colon-flash 1s infinite step-end;
  }

  @keyframes colon-flash {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.15; }
  }

  /* AM/PM Text */
  .ampm-container {
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #00E5FF;
    align-self: flex-start;
    margin-top: 10px;
    margin-left: 8px;
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
  }

  .footer-lbl {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 0.7rem;
    color: #00E5FF;
    opacity: 0.35;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 24px;
    user-select: none;
  }

  /* Back to profile link button */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 28px;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    color: #4c6175;
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .back-btn:hover {
    color: #00E5FF;
  }

  .back-btn svg {
    width: 12px;
    height: 12px;
    fill: currentColor;
    transition: transform 0.2s ease;
  }

  .back-btn:hover svg {
    transform: translateX(-3px);
  }

  /* Interactive grid lines inside panel */
  .display-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 6px);
    pointer-events: none;
    border-radius: 12px;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="container">
  <div class="bezel">
    <div class="scanline"></div>
    
    <div class="header">
      <span class="title">7-Segment Digital Clock</span>
      <div class="status">
        <span class="status-dot"></span>
        <span>IST LIVE</span>
      </div>
    </div>

    <!-- DIGITAL TIME PANEL -->
    <div class="display-panel">
      <!-- Hours -->
      <div class="digit-container" id="h1">
        <svg viewBox="0 0 32 52"></svg>
      </div>
      <div class="digit-container" id="h0">
        <svg viewBox="0 0 32 52"></svg>
      </div>

      <!-- Colon -->
      <div class="colon-container">
        <div class="colon-dot blink"></div>
        <div class="colon-dot blink"></div>
      </div>

      <!-- Minutes -->
      <div class="digit-container" id="m1">
        <svg viewBox="0 0 32 52"></svg>
      </div>
      <div class="digit-container" id="m0">
        <svg viewBox="0 0 32 52"></svg>
      </div>

      <!-- Colon -->
      <div class="colon-container">
        <div class="colon-dot blink"></div>
        <div class="colon-dot blink"></div>
      </div>

      <!-- Seconds -->
      <div class="digit-container" id="s1">
        <svg viewBox="0 0 32 52"></svg>
      </div>
      <div class="digit-container" id="s0">
        <svg viewBox="0 0 32 52"></svg>
      </div>

      <!-- AM / PM -->
      <div class="ampm-container" id="ampm">AM</div>
    </div>

    <div class="footer-lbl">Indian Standard Time</div>
  </div>

  <a href="https://github.com/IlIGODIlI" class="back-btn">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back to Profile
  </a>
</div>

<script>
  // Segment paths definitions
  const segments = {
    a: "M 4,2 L 28,2 L 25,5 L 7,5 Z",
    b: "M 29,4 L 29,25 L 26,22 L 26,7 Z",
    c: "M 29,27 L 29,48 L 26,45 L 26,30 Z",
    d: "M 4,50 L 28,50 L 25,47 L 7,47 Z",
    e: "M 3,27 L 3,48 L 6,45 L 6,30 Z",
    f: "M 3,4 L 3,25 L 6,22 L 6,7 Z",
    g: "M 5,26 L 8,24 L 24,24 L 27,26 L 24,28 L 8,28 Z"
  };

  // Digit to segment mapping
  const digitMap = {
    0: ['a', 'b', 'c', 'd', 'e', 'f'],
    1: ['b', 'c'],
    2: ['a', 'b', 'g', 'e', 'd'],
    3: ['a', 'b', 'g', 'c', 'd'],
    4: ['f', 'g', 'b', 'c'],
    5: ['a', 'f', 'g', 'c', 'd'],
    6: ['a', 'f', 'g', 'c', 'd', 'e'],
    7: ['a', 'b', 'c'],
    8: ['a', 'b', 'c', 'd', 'e', 'f', 'g'],
    9: ['a', 'b', 'c', 'd', 'f', 'g']
  };

  const digits = ['h1', 'h0', 'm1', 'm0', 's1', 's0'];
  const digitElMap = {};

  // Initialize SVG templates inside the containers
  digits.forEach(id => {
    const container = document.getElementById(id);
    const svg = container.querySelector('svg');
    
    // Draw all 7 segment paths
    Object.keys(segments).forEach(key => {
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", segments[key]);
      path.setAttribute("class", `seg seg-${key} dim`);
      svg.appendChild(path);
    });
    
    digitElMap[id] = svg;
  });

  const ampmEl = document.getElementById('ampm');

  function updateDigit(id, val) {
    const svg = digitElMap[id];
    const activeSegs = digitMap[val] || [];
    
    Object.keys(segments).forEach(key => {
      const path = svg.querySelector(`.seg-${key}`);
      if (activeSegs.includes(key)) {
        path.classList.add('lit');
        path.classList.remove('dim');
      } else {
        path.classList.add('dim');
        path.classList.remove('lit');
      }
    });
  }

  function updateClock() {
    const now = new Date();
    
    // Format IST time (UTC+5:30)
    const istOffset = 5.5 * 60 * 60 * 1000;
    const istTime = new Date(now.getTime() + istOffset + now.getTimezoneOffset() * 60 * 1000);
    
    let hr = istTime.getHours();
    let mn = istTime.getMinutes();
    let sc = istTime.getSeconds();
    
    const ampm = hr >= 12 ? 'PM' : 'AM';
    ampmEl.textContent = ampm;
    
    hr = hr % 12;
    hr = hr ? hr : 12; // Rollover 0 to 12
    
    const h1Val = Math.floor(hr / 10);
    const h0Val = hr % 10;
    const m1Val = Math.floor(mn / 10);
    const m0Val = mn % 10;
    const s1Val = Math.floor(sc / 10);
    const s0Val = sc % 10;
    
    updateDigit('h1', h1Val);
    updateDigit('h0', h0Val);
    updateDigit('m1', m1Val);
    updateDigit('m0', m0Val);
    updateDigit('s1', s1Val);
    updateDigit('s0', s0Val);
  }

  // Update clock every 100ms for responsiveness
  setInterval(updateClock, 100);
  updateClock();
</script>
</body>
</html>

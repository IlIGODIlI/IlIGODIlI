<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuffle Text Digital Clock — IST</title>
<meta name="description" content="An interactive digital clock utilizing a text-shuffling scramble effect to display Indian Standard Time.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Press+Start+2P&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: #050505;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  .container {
    width: 100%;
    max-width: 500px;
    padding: 24px;
    text-align: center;
  }

  /* Minimalist Box Bezel */
  .bezel {
    background: #0c0c0c;
    border: 1px solid #1a1a1a;
    border-radius: 12px;
    padding: 48px 32px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
    position: relative;
  }

  /* Time display using Press Start 2P font, pure white, no glow */
  .time-display {
    font-family: 'Press Start 2P', monospace;
    font-size: 1.55rem;
    font-weight: bold;
    color: #ffffff;
    line-height: 1.2;
    letter-spacing: 1px;
    user-select: none;
    cursor: pointer;
    margin-bottom: 24px;
    transition: opacity 0.2s ease;
  }

  .time-display:hover {
    opacity: 0.85;
  }

  /* Divider line */
  .divider {
    height: 1px;
    background-color: #1a1a1a;
    margin: 20px 0;
  }

  /* Secondary Information */
  .sub-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.55rem;
    color: #555555;
  }

  .info-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: left;
    cursor: pointer;
    transition: color 0.2s ease;
  }

  .info-group:hover {
    color: #888888;
  }

  .info-group:last-child {
    text-align: right;
  }

  .label {
    color: #333333;
    font-size: 0.45rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .info-val {
    color: #888888;
  }

  .info-val.white {
    color: #ffffff;
  }

  /* Back to profile link */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 32px;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    color: #555555;
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .back-btn:hover {
    color: #ffffff;
  }

  .back-btn svg {
    width: 12px;
    height: 12px;
    fill: currentColor;
    transition: transform 0.2s ease;
  }

  .back-btn:hover svg {
    transform: translateX(-3px);
  }
</style>
</head>
<body>
<div class="container">
  <div class="bezel">
    <!-- TIME PANEL -->
    <div class="time-display" id="time-val" title="Click or hover to shuffle time">00:00:00 AM</div>

    <div class="divider"></div>

    <!-- SUB INFO -->
    <div class="sub-info">
      <div class="info-group" id="date-panel" title="Hover to shuffle date">
        <span class="label">DATE</span>
        <div class="info-val" id="date-val">LOADING...</div>
      </div>
      <div class="info-group" id="epoch-panel" title="Hover to shuffle epoch">
        <span class="label">EPOCH</span>
        <div class="info-val white" id="epoch-val">0000000000</div>
      </div>
    </div>
  </div>

  <a href="https://github.com/IlIGODIlI" class="back-btn">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back to Profile
  </a>
</div>

<script>
  // High fidelity scrambler implementation
  class TextScrambler {
    constructor(el, scrambleCharset = "0123456789%@$#&?") {
      this.el = el;
      this.scrambleCharset = scrambleCharset;
      this.resolveQueue = [];
      this.frameId = null;
      this.update = this.update.bind(this);
      this.currentText = el.textContent || "";
    }

    scrambleTo(newText, partial = true) {
      const oldText = this.currentText;
      const maxLength = Math.max(oldText.length, newText.length);
      this.resolveQueue = [];

      for (let i = 0; i < maxLength; i++) {
        const from = oldText[i] || "";
        const to = newText[i] || "";

        if (partial && from === to) {
          this.resolveQueue.push({
            to,
            startFrame: 0,
            endFrame: 0,
            current: to
          });
        } else {
          const startFrame = Math.floor(Math.random() * 4);
          const endFrame = startFrame + Math.floor(6 + Math.random() * 10);
          this.resolveQueue.push({
            to,
            startFrame,
            endFrame,
            current: from || this.scrambleCharset[Math.floor(Math.random() * this.scrambleCharset.length)]
          });
        }
      }

      this.frame = 0;
      this.currentText = newText;

      if (this.frameId) cancelAnimationFrame(this.frameId);
      this.frameId = requestAnimationFrame(this.update);
    }

    update() {
      let output = "";
      let complete = true;

      for (let i = 0; i < this.resolveQueue.length; i++) {
        const item = this.resolveQueue[i];
        if (this.frame >= item.endFrame) {
          output += item.to;
        } else if (this.frame >= item.startFrame) {
          complete = false;
          if (Math.random() < 0.3) {
            item.current = this.scrambleCharset[Math.floor(Math.random() * this.scrambleCharset.length)];
          }
          output += item.current;
        } else {
          complete = false;
          output += item.current;
        }
      }

      this.el.textContent = output;

      if (!complete) {
        this.frame++;
        this.frameId = requestAnimationFrame(this.update);
      }
    }
  }

  const timeEl = document.getElementById('time-val');
  const dateEl = document.getElementById('date-val');
  const epochEl = document.getElementById('epoch-val');
  const clockPanel = document.getElementById('time-val');
  const datePanel = document.getElementById('date-panel');
  const epochPanel = document.getElementById('epoch-panel');

  const timeScrambler = new TextScrambler(timeEl, "0123456789: APM");
  const dateScrambler = new TextScrambler(dateEl, "ABCDEFGHIJKLMNOPQRSTUVWXYZ, 0123456789");
  const epochScrambler = new TextScrambler(epochEl, "0123456789");

  let forceFullTimeShuffle = true;

  function getISTTime() {
    const now = new Date();
    const istOffset = 5.5 * 60 * 60 * 1000;
    return new Date(now.getTime() + istOffset + now.getTimezoneOffset() * 60 * 1000);
  }

  function getEpochSeconds() {
    return Math.floor(Date.now() / 1000);
  }

  function updateClock() {
    const istTime = getISTTime();
    
    let hr = istTime.getHours();
    let mn = istTime.getMinutes();
    let sc = istTime.getSeconds();
    
    const ampm = hr >= 12 ? 'PM' : 'AM';
    hr = hr % 12;
    hr = hr ? hr : 12;
    
    const hrStr = String(hr).padStart(2, '0');
    const mnStr = String(mn).padStart(2, '0');
    const scStr = String(sc).padStart(2, '0');
    const timeStr = `${hrStr}:${mnStr}:${scStr} ${ampm}`;

    timeScrambler.scrambleTo(timeStr, !forceFullTimeShuffle);
    forceFullTimeShuffle = false;

    const epochStr = String(getEpochSeconds());
    epochScrambler.scrambleTo(epochStr, true);

    const options = { weekday: 'short', month: 'short', day: 'numeric' };
    const dateStr = istTime.toLocaleDateString('en-US', options).toUpperCase();
    if (dateEl.textContent === "LOADING...") {
      dateScrambler.scrambleTo(dateStr, false);
    }
  }

  clockPanel.addEventListener('mouseenter', () => {
    forceFullTimeShuffle = true;
    updateClock();
  });
  clockPanel.addEventListener('click', () => {
    forceFullTimeShuffle = true;
    updateClock();
  });

  datePanel.addEventListener('mouseenter', () => {
    const istTime = getISTTime();
    const options = { weekday: 'short', month: 'short', day: 'numeric' };
    const dateStr = istTime.toLocaleDateString('en-US', options).toUpperCase();
    dateScrambler.scrambleTo(dateStr, false);
  });

  epochPanel.addEventListener('mouseenter', () => {
    const epochStr = String(getEpochSeconds());
    epochScrambler.scrambleTo(epochStr, false);
  });

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuffle Text Digital Clock — IST</title>
<meta name="description" content="An interactive digital clock utilizing a text-shuffling scramble effect to display Indian Standard Time.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@600;700&family=Press+Start+2P&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: #050816;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Futuristic background mesh & glow */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 15% 25%, rgba(0, 229, 255, 0.05) 0%, transparent 40%),
      radial-gradient(circle at 85% 75%, rgba(0, 229, 255, 0.03) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, #081124 0%, #050816 70%);
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(18, 24, 40, 0.12) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(18, 24, 40, 0.12) 1px, transparent 1px);
    background-size: 24px 24px;
    z-index: 1;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 500px;
    padding: 24px;
    text-align: center;
  }

  /* Minimalist Box Bezel with glassmorphism */
  .bezel {
    background: rgba(11, 15, 25, 0.65);
    border: 1px solid rgba(0, 229, 255, 0.08);
    border-radius: 12px;
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    padding: 48px 32px 32px 32px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
    position: relative;
  }

  /* Header Section */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    padding-bottom: 10px;
  }

  .title {
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: #00E5FF;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.45rem;
    color: #00ff88;
    font-weight: bold;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    background-color: #00ff88;
    border-radius: 50%;
    box-shadow: 0 0 6px #00ff88;
    animation: breathe 2s infinite ease-in-out;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 1; }
  }

  /* Time display using Press Start 2P font, glowing cyan */
  .time-display {
    font-family: 'Press Start 2P', monospace;
    font-size: 1.55rem;
    font-weight: bold;
    color: #00E5FF;
    text-shadow: 0 0 12px rgba(0, 229, 255, 0.4), 0 0 24px rgba(0, 229, 255, 0.15);
    line-height: 1.2;
    letter-spacing: 1px;
    user-select: none;
    cursor: pointer;
    margin-bottom: 24px;
    transition: opacity 0.2s ease;
  }

  .time-display:hover {
    opacity: 0.85;
  }

  /* Bottom accent line */
  .accent-line {
    height: 1.5px;
    background-color: #00E5FF;
    opacity: 0.4;
    border-radius: 0.75px;
    margin: 20px 0;
    animation: accent-pulse 4s infinite ease-in-out;
  }

  @keyframes accent-pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  /* Secondary Information */
  .sub-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.55rem;
    color: #2a3a4a;
  }

  .info-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: left;
    cursor: pointer;
    transition: color 0.2s ease;
  }

  .info-group:hover {
    color: #4c6175;
  }

  .info-group:last-child {
    text-align: right;
  }

  .label {
    color: #2a3a4a;
    font-size: 0.45rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: bold;
  }

  .info-val {
    color: #4c6175;
  }

  .info-val.white {
    color: #00E5FF;
    text-shadow: 0 0 6px rgba(0, 229, 255, 0.2);
  }

  /* Back to profile link */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 32px;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    color: #4c6175;
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .back-btn:hover {
    color: #00E5FF;
  }

  .back-btn svg {
    width: 12px;
    height: 12px;
    fill: currentColor;
    transition: transform 0.2s ease;
  }

  .back-btn:hover svg {
    transform: translateX(-3px);
  }
</style>
</head>
<body>
<div class="container">
  <div class="bezel">
    <div class="header">
      <span class="title">Shuffle System Clock</span>
      <div class="status">
        <span class="status-dot"></span>
        <span>IST STABLE</span>
      </div>
    </div>

    <!-- TIME PANEL -->
    <div class="time-display" id="time-val" title="Click or hover to shuffle time">00:00:00 AM</div>

    <!-- Bottom progress line -->
    <div class="accent-line"></div>

    <!-- SUB INFO -->
    <div class="sub-info">
      <div class="info-group" id="date-panel" title="Hover to shuffle date">
        <span class="label">DATE</span>
        <div class="info-val" id="date-val">LOADING...</div>
      </div>
      <div class="info-group" id="epoch-panel" title="Hover to shuffle epoch">
        <span class="label">EPOCH</span>
        <div class="info-val white" id="epoch-val">0000000000</div>
      </div>
    </div>
  </div>

  <a href="https://github.com/IlIGODIlI" class="back-btn">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back to Profile
  </a>
</div>

<script>
  // High fidelity scrambler implementation
  class TextScrambler {
    constructor(el, scrambleCharset = "0123456789%@$#&?") {
      this.el = el;
      this.scrambleCharset = scrambleCharset;
      this.resolveQueue = [];
      this.frameId = null;
      this.update = this.update.bind(this);
      this.currentText = el.textContent || "";
    }

    scrambleTo(newText, partial = true) {
      const oldText = this.currentText;
      const maxLength = Math.max(oldText.length, newText.length);
      this.resolveQueue = [];

      for (let i = 0; i < maxLength; i++) {
        const from = oldText[i] || "";
        const to = newText[i] || "";

        if (partial && from === to) {
          this.resolveQueue.push({
            to,
            startFrame: 0,
            endFrame: 0,
            current: to
          });
        } else {
          const startFrame = Math.floor(Math.random() * 4);
          const endFrame = startFrame + Math.floor(6 + Math.random() * 10);
          this.resolveQueue.push({
            to,
            startFrame,
            endFrame,
            current: from || this.scrambleCharset[Math.floor(Math.random() * this.scrambleCharset.length)]
          });
        }
      }

      this.frame = 0;
      this.currentText = newText;

      if (this.frameId) cancelAnimationFrame(this.frameId);
      this.frameId = requestAnimationFrame(this.update);
    }

    update() {
      let output = "";
      let complete = true;

      for (let i = 0; i < this.resolveQueue.length; i++) {
        const item = this.resolveQueue[i];
        if (this.frame >= item.endFrame) {
          output += item.to;
        } else if (this.frame >= item.startFrame) {
          complete = false;
          if (Math.random() < 0.3) {
            item.current = this.scrambleCharset[Math.floor(Math.random() * this.scrambleCharset.length)];
          }
          output += item.current;
        } else {
          complete = false;
          output += item.current;
        }
      }

      this.el.textContent = output;

      if (!complete) {
        this.frame++;
        this.frameId = requestAnimationFrame(this.update);
      }
    }
  }

  const timeEl = document.getElementById('time-val');
  const dateEl = document.getElementById('date-val');
  const epochEl = document.getElementById('epoch-val');
  const clockPanel = document.getElementById('time-val');
  const datePanel = document.getElementById('date-panel');
  const epochPanel = document.getElementById('epoch-panel');

  const timeScrambler = new TextScrambler(timeEl, "0123456789: APM");
  const dateScrambler = new TextScrambler(dateEl, "ABCDEFGHIJKLMNOPQRSTUVWXYZ, 0123456789");
  const epochScrambler = new TextScrambler(epochEl, "0123456789");

  let forceFullTimeShuffle = true;

  function getISTTime() {
    const now = new Date();
    const istOffset = 5.5 * 60 * 60 * 1000;
    return new Date(now.getTime() + istOffset + now.getTimezoneOffset() * 60 * 1000);
  }

  function getEpochSeconds() {
    return Math.floor(Date.now() / 1000);
  }

  function updateClock() {
    const istTime = getISTTime();
    
    let hr = istTime.getHours();
    let mn = istTime.getMinutes();
    let sc = istTime.getSeconds();
    
    const ampm = hr >= 12 ? 'PM' : 'AM';
    hr = hr % 12;
    hr = hr ? hr : 12;
    
    const hrStr = String(hr).padStart(2, '0');
    const mnStr = String(mn).padStart(2, '0');
    const scStr = String(sc).padStart(2, '0');
    const timeStr = `${hrStr}:${mnStr}:${scStr} ${ampm}`;

    timeScrambler.scrambleTo(timeStr, !forceFullTimeShuffle);
    forceFullTimeShuffle = false;

    const epochStr = String(getEpochSeconds());
    epochScrambler.scrambleTo(epochStr, true);

    const options = { weekday: 'short', month: 'short', day: 'numeric' };
    const dateStr = istTime.toLocaleDateString('en-US', options).toUpperCase();
    if (dateEl.textContent === "LOADING...") {
      dateScrambler.scrambleTo(dateStr, false);
    }
  }

  clockPanel.addEventListener('mouseenter', () => {
    forceFullTimeShuffle = true;
    updateClock();
  });
  clockPanel.addEventListener('click', () => {
    forceFullTimeShuffle = true;
    updateClock();
  });

  datePanel.addEventListener('mouseenter', () => {
    const istTime = getISTTime();
    const options = { weekday: 'short', month: 'short', day: 'numeric' };
    const dateStr = istTime.toLocaleDateString('en-US', options).toUpperCase();
    dateScrambler.scrambleTo(dateStr, false);
  });

  epochPanel.addEventListener('mouseenter', () => {
    const epochStr = String(getEpochSeconds());
    epochScrambler.scrambleTo(epochStr, false);
  });

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>

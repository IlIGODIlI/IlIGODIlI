<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aryan Nair — Premium GitHub Banner</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: #050816;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    padding: 20px;
  }

  /* Core Banner Container (GitHub Contribution Graph sized) */
  .banner-container {
    width: 900px;
    height: 220px;
    background-color: #050816;
    border: 1px solid rgba(0, 229, 255, 0.08);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
    cursor: pointer;
  }

  /* Grid Canvas */
  .grid-canvas {
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 2;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1000px;
  }

  .cubes-grid {
    display: grid;
    grid-template-columns: repeat(38, 18px);
    grid-template-rows: repeat(8, 18px);
    gap: 5px;
    width: max-content;
    height: max-content;
    transform-style: preserve-3d;
  }

  /* 3D Cube wrapper */
  .cube-wrapper {
    position: relative;
    width: 18px;
    height: 18px;
    transform-style: preserve-3d;
    will-change: transform;
  }

  /* Flat face mimicking 3D projection */
  .cube-face {
    position: absolute;
    width: 100%;
    height: 100%;
    background-color: transparent;
    border: 1.5px solid rgba(0, 229, 255, 0.12); /* Inactive cells 12% opacity outline */
    border-radius: 3px;
    transition: border-color 0.3s, background-color 0.3s, box-shadow 0.3s;
    box-shadow: none;
    will-change: border-color, background-color, box-shadow;
  }

  /* Active Letter Cells (High contrast, solid glow, no pulsing) */
  .cube-wrapper.active-letter .cube-face {
    border-color: #00E5FF;
    background-color: rgba(0, 229, 255, 0.08);
    box-shadow: 0 0 8px rgba(0, 229, 255, 0.4),
                inset 0 0 4px rgba(0, 229, 255, 0.15);
  }
</style>
</head>
<body>

  <!-- Premium Banner -->
  <div class="banner-container" id="banner">
    <!-- Contribution Grid -->
    <div class="grid-canvas" id="scene">
      <div class="cubes-grid" id="cubes-grid"></div>
    </div>
  </div>

  <!-- GSAP Library for original Can Tastemel tilt physics -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    const grid = document.getElementById('cubes-grid');
    const scene = document.getElementById('scene');
    const rows = 8;
    const cols = 38;
    const cubes = [];

    // Hand-tuned pixel-perfect map for bold block-style "ARYAN"
    const ARYAN_MAP = new Set([
      // A (cols 2..7)
      '1,4', '1,5',
      '2,3', '2,4', '2,5', '2,6',
      '3,2', '3,3', '3,6', '3,7',
      '4,2', '4,3', '4,4', '4,5', '4,6', '4,7',
      '5,2', '5,3', '5,6', '5,7',
      '6,2', '6,3', '6,6', '6,7',

      // R (cols 9..14)
      '1,9', '1,10', '1,11', '1,12', '1,13',
      '2,9', '2,10', '2,13', '2,14',
      '3,9', '3,10', '3,13', '3,14',
      '4,9', '4,10', '4,11', '4,12', '4,13',
      '5,9', '5,10', '5,12', '5,13',
      '6,9', '6,10', '6,13', '6,14',

      // Y (cols 16..21)
      '1,16', '1,17', '1,20', '1,21',
      '2,16', '2,17', '2,20', '2,21',
      '3,17', '3,18', '3,19', '3,20',
      '4,18', '4,19',
      '5,18', '5,19',
      '6,18', '6,19',

      // A (cols 23..28)
      '1,25', '1,26',
      '2,24', '2,25', '2,26', '2,27',
      '3,23', '3,24', '3,27', '3,28',
      '4,23', '4,24', '4,25', '4,26', '4,27', '4,28',
      '5,23', '5,24', '5,27', '5,28',
      '6,23', '6,24', '6,27', '6,28',

      // N (cols 30..35)
      '1,30', '1,31', '1,34', '1,35',
      '2,30', '2,31', '2,32', '2,34', '2,35',
      '3,30', '3,31', '3,32', '3,33', '3,34', '3,35',
      '4,30', '4,31', '4,33', '4,34', '4,35',
      '5,30', '5,31', '5,34', '5,35',
      '6,30', '6,31', '6,34', '6,35'
    ]);

    // Generate the 38x8 grid structure
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'cube-wrapper';
        wrapper.dataset.row = r;
        wrapper.dataset.col = c;

        if (ARYAN_MAP.has(`${r},${c}`)) {
          wrapper.classList.add('active-letter');
        }

        const face = document.createElement('div');
        face.className = 'cube-face';
        wrapper.appendChild(face);

        grid.appendChild(wrapper);
        cubes.push(wrapper);
      }
    }

    // Restrained and elegant springs / tilt logic
    const radius = 3.5;
    const maxAngle = 18; // Restrained tilt range (±5-8 degrees)
    const duration = { enter: 0.25, leave: 0.5 };
    const easing = 'power2.out';

    function tiltAt(rowCenter, colCenter) {
      cubes.forEach(cube => {
        const r = +cube.dataset.row;
        const c = +cube.dataset.col;
        const dist = Math.hypot(r - rowCenter, c - colCenter);
        const isActive = cube.classList.contains('active-letter');
        
        if (dist <= radius) {
          const pct = 1 - dist / radius;
          const angle = pct * maxAngle;
          
          // Slight translation 2-4px towards cursor
          const deltaX = (colCenter - c) * 1.5 * pct;
          const deltaY = (rowCenter - r) * 1.5 * pct;
          
          gsap.to(cube, {
            duration: duration.enter,
            ease: easing,
            overwrite: true,
            rotateX: -angle,
            rotateY: angle,
            x: deltaX,
            y: deltaY,
            scale: 1 + pct * 0.08 // Scale to approx 1.08
          });

          // Brighten and increase glow subtly
          const face = cube.querySelector('.cube-face');
          gsap.to(face, {
            duration: duration.enter,
            borderColor: isActive ? '#5effff' : 'rgba(0, 229, 255, 0.4)',
            backgroundColor: isActive ? 'rgba(0, 229, 255, 0.16)' : 'rgba(0, 229, 255, 0.04)',
            boxShadow: isActive ? '0 0 12px rgba(0, 229, 255, 0.65)' : 'none'
          });

        } else {
          // Spring back naturally
          gsap.to(cube, {
            duration: duration.leave,
            ease: 'power3.out',
            overwrite: true,
            rotateX: 0,
            rotateY: 0,
            x: 0,
            y: 0,
            scale: 1
          });

          const face = cube.querySelector('.cube-face');
          gsap.to(face, {
            duration: duration.leave,
            borderColor: '',
            backgroundColor: '',
            boxShadow: ''
          });
        }
      });
    }

    function resetAll() {
      cubes.forEach(cube => {
        gsap.to(cube, {
          duration: duration.leave,
          rotateX: 0,
          rotateY: 0,
          x: 0,
          y: 0,
          scale: 1,
          ease: 'power3.out'
        });
        const face = cube.querySelector('.cube-face');
        gsap.to(face, {
          duration: duration.leave,
          borderColor: '',
          backgroundColor: '',
          boxShadow: ''
        });
      });
    }

    // Listeners for pointer movement
    scene.addEventListener('pointermove', e => {
      const rect = scene.getBoundingClientRect();
      const cellW = rect.width / cols;
      const cellH = rect.height / rows;
      const colCenter = (e.clientX - rect.left) / cellW;
      const rowCenter = (e.clientY - rect.top) / cellH;

      tiltAt(rowCenter, colCenter);
    });

    scene.addEventListener('pointerleave', resetAll);

  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Project — Animation Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: #050816;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 20px;
  }

  /* Square Widget Container */
  .project-widget {
    width: 220px;
    height: 220px;
    background-color: #0b0f19;
    border: 1px solid rgba(0, 229, 255, 0.08);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 16px 36px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
  }

  .project-widget:hover {
    border-color: rgba(0, 229, 255, 0.25);
    box-shadow: 0 20px 45px rgba(0, 229, 255, 0.06), 0 16px 36px rgba(0, 0, 0, 0.6);
  }

  /* Text Block (Idle view) - Sleek formatting */
  .text-block {
    width: 100%;
    font-family: 'Outfit', sans-serif;
    font-size: 1.05rem;
    line-height: 1.5;
    color: #e2e8f0;
    font-weight: 300;
    text-align: left;
    transition: opacity 0.5s cubic-bezier(0.25, 1, 0.25, 1), transform 0.5s cubic-bezier(0.25, 1, 0.25, 1);
    opacity: 1;
    z-index: 5;
    letter-spacing: -0.01em;
  }

  /* Large Highlighted Header */
  .text-block .header-text {
    font-size: 1.15rem; /* Larger font size */
    color: #00E5FF;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
  }

  /* Highlight RepoLens */
  .text-block strong {
    color: #00E5FF;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
  }

  .project-widget:hover .text-block {
    opacity: 0;
    transform: translateY(-8px) scale(0.96);
    pointer-events: none;
  }

  /* Animation Container (Hover view) */
  .anim-container {
    position: absolute;
    inset: 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    opacity: 0;
    transform: translateY(8px) scale(1.02);
    transition: opacity 0.5s cubic-bezier(0.25, 1, 0.25, 1), transform 0.5s cubic-bezier(0.25, 1, 0.25, 1);
    z-index: 2;
    font-family: 'JetBrains Mono', monospace;
  }

  .project-widget:hover .anim-container {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* Phase 1: File Tree Structure */
  .repo-view {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 0.72rem;
    color: #8b949e;
    position: relative;
    height: 120px;
    overflow: hidden;
    width: 100%;
    transition: opacity 0.4s ease;
  }

  .repo-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .repo-item.folder { color: #00E5FF; font-weight: 700; }
  .repo-item.indent { margin-left: 14px; }

  /* Analyzing Scanline effect */
  .scanline {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00E5FF, transparent);
    box-shadow: 0 0 8px #00E5FF;
    animation: scan 2s linear infinite;
    pointer-events: none;
    z-index: 10;
  }

  @keyframes scan {
    0% { top: 0%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  /* Phase 2: JSON file conversion view */
  .json-view {
    display: flex;
    flex-direction: column;
    font-size: 0.65rem;
    color: #39d353; /* Success green/cyan highlight */
    height: 120px;
    justify-content: center;
    background: rgba(0, 0, 0, 0.25);
    border-radius: 6px;
    padding: 12px;
    border: 1px solid rgba(0, 229, 255, 0.05);
    opacity: 0;
    position: absolute;
    inset: 0;
    transition: opacity 0.4s ease;
  }

  .json-view span {
    color: #00E5FF;
  }

  /* Status info bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.65rem;
    color: #4c4c5e;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    padding-top: 8px;
  }

  .status-text {
    color: #00E5FF;
    font-weight: bold;
    text-shadow: 0 0 6px rgba(0, 229, 255, 0.3);
  }
</style>
</head>
<body>

  <!-- Square Project Widget -->
  <div class="project-widget" id="widget">
    <!-- Idle text - Confident, benefit-driven Apple/Vercel-style copy -->
    <div class="text-block">
      <span class="header-text">Currently building</span><br>
      <br>
      <strong>RepoLens</strong>,<br>
      making every<br>
      repository easier<br>
      to understand.
    </div>

    <!-- Hover Scan/JSON Animation Container -->
    <div class="anim-container">
      <div style="position: relative; flex-grow: 1;">
        <!-- Step 1: Repo view -->
        <div class="repo-view" id="repo-view">
          <div class="scanline"></div>
          <div class="repo-item folder">📁 src</div>
          <div class="repo-item folder indent">📁 components</div>
          <div class="repo-item indent">📄 Lens.py</div>
          <div class="repo-item indent">📄 Parser.java</div>
          <div class="repo-item folder">📁 config</div>
          <div class="repo-item indent">📄 schema.sql</div>
        </div>

        <!-- Step 2: JSON output -->
        <div class="json-view" id="json-view">
          <div>{</div>
          <div style="margin-left: 10px;"><span>"status"</span>: "analyzed",</div>
          <div style="margin-left: 10px;"><span>"repo"</span>: "RepoLens",</div>
          <div style="margin-left: 10px;"><span>"files"</span>: 124,</div>
          <div style="margin-left: 10px;"><span>"language"</span>: "Python",</div>
          <div style="margin-left: 10px;"><span>"insights"</span>: true</div>
          <div>}</div>
        </div>
      </div>

      <div class="status-bar">
        <span id="status-label">ANALYZING</span>
        <span class="status-text" id="status-dots">...</span>
      </div>
    </div>
  </div>

<script>
  const widget = document.getElementById('widget');
  const repoView = document.getElementById('repo-view');
  const jsonView = document.getElementById('json-view');
  const statusLabel = document.getElementById('status-label');
  const statusDots = document.getElementById('status-dots');

  let animInterval = null;

  // Start sequence loop when hovering
  widget.addEventListener('mouseenter', () => {
    let step = 0;
    
    // Cycle between Scan and JSON
    function runCycle() {
      if (step === 0) {
        // Step 1: Scan file tree
        repoView.style.opacity = '1';
        jsonView.style.opacity = '0';
        statusLabel.textContent = 'ANALYZING';
        statusDots.textContent = '...';

        // Set timeout to switch to JSON representation
        animInterval = setTimeout(() => {
          step = 1;
          runCycle();
        }, 2200);
      } else {
        // Step 2: Render parsed JSON output
        repoView.style.opacity = '0';
        jsonView.style.opacity = '1';
        statusLabel.textContent = 'CONVERTED';
        statusDots.textContent = 'JSON';

        // Pause before looping back
        animInterval = setTimeout(() => {
          step = 0;
          runCycle();
        }, 2200);
      }
    }

    runCycle();
  });

  // Reset animations when leaving hover
  widget.addEventListener('mouseleave', () => {
    clearTimeout(animInterval);
    repoView.style.opacity = '1';
    jsonView.style.opacity = '0';
    statusLabel.textContent = 'ANALYZING';
    statusDots.textContent = '...';
  });

</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220">
  <defs>
    <radialGradient id="lcd-glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </radialGradient>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .bg { fill: #0b0f19; stroke: rgba(0,229,255,0.08); stroke-width: 1; }

    .time-digit {
      font-family: 'Consolas', 'Courier New', 'Lucida Console', monospace;
      font-size: 72px;
      fill: #00E5FF;
      font-weight: 700;
      letter-spacing: 2px;
      dominant-baseline: central;
    }

    .time-digit-dim {
      font-family: 'Consolas', 'Courier New', 'Lucida Console', monospace;
      font-size: 72px;
      fill: #0a1828;
      font-weight: 700;
      letter-spacing: 2px;
      dominant-baseline: central;
    }

    .time-sec {
      font-family: 'Consolas', 'Courier New', 'Lucida Console', monospace;
      font-size: 36px;
      fill: #00E5FF;
      font-weight: 700;
      dominant-baseline: central;
    }

    /* Colon blink */
    @keyframes colon-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.15; }
    }
    .colon { animation: colon-blink 1s infinite steps(1); }

    /* Seconds ONES digit — cycles 0→9 over 10s */
    @keyframes s0 { 0%,10%{opacity:1} 10.1%,100%{opacity:0} }
    @keyframes s1 { 0%,10%{opacity:0} 10.1%,20%{opacity:1} 20.1%,100%{opacity:0} }
    @keyframes s2 { 0%,20%{opacity:0} 20.1%,30%{opacity:1} 30.1%,100%{opacity:0} }
    @keyframes s3 { 0%,30%{opacity:0} 30.1%,40%{opacity:1} 40.1%,100%{opacity:0} }
    @keyframes s4 { 0%,40%{opacity:0} 40.1%,50%{opacity:1} 50.1%,100%{opacity:0} }
    @keyframes s5 { 0%,50%{opacity:0} 50.1%,60%{opacity:1} 60.1%,100%{opacity:0} }
    @keyframes s6 { 0%,60%{opacity:0} 60.1%,70%{opacity:1} 70.1%,100%{opacity:0} }
    @keyframes s7 { 0%,70%{opacity:0} 70.1%,80%{opacity:1} 80.1%,100%{opacity:0} }
    @keyframes s8 { 0%,80%{opacity:0} 80.1%,90%{opacity:1} 90.1%,100%{opacity:0} }
    @keyframes s9 { 0%,90%{opacity:0} 90.1%,100%{opacity:1} }
    .s0{animation:s0 10s infinite} .s1{animation:s1 10s infinite}
    .s2{animation:s2 10s infinite} .s3{animation:s3 10s infinite}
    .s4{animation:s4 10s infinite} .s5{animation:s5 10s infinite}
    .s6{animation:s6 10s infinite} .s7{animation:s7 10s infinite}
    .s8{animation:s8 10s infinite} .s9{animation:s9 10s infinite}

    /* Seconds TENS digit — cycles 0→5 over 60s */
    @keyframes t0 { 0%,16.66%{opacity:1} 16.67%,100%{opacity:0} }
    @keyframes t1 { 0%,16.66%{opacity:0} 16.67%,33.33%{opacity:1} 33.34%,100%{opacity:0} }
    @keyframes t2 { 0%,33.33%{opacity:0} 33.34%,50%{opacity:1} 50.01%,100%{opacity:0} }
    @keyframes t3 { 0%,50%{opacity:0} 50.01%,66.66%{opacity:1} 66.67%,100%{opacity:0} }
    @keyframes t4 { 0%,66.66%{opacity:0} 66.67%,83.33%{opacity:1} 83.34%,100%{opacity:0} }
    @keyframes t5 { 0%,83.33%{opacity:0} 83.34%,100%{opacity:1} }
    .t0{animation:t0 60s infinite} .t1{animation:t1 60s infinite}
    .t2{animation:t2 60s infinite} .t3{animation:t3 60s infinite}
    .t4{animation:t4 60s infinite} .t5{animation:t5 60s infinite}

    .label {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 10px;
      fill: #1a2a3a;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .date-text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      fill: #2a3a4a;
    }

    /* Ambient scanning line */
    @keyframes scanline {
      0% { transform: translateY(-20px); opacity: 0; }
      10%, 90% { opacity: 0.06; }
      100% { transform: translateY(220px); opacity: 0; }
    }
    .scanline {
      animation: scanline 6s infinite linear;
    }

    /* Status dot */
    @keyframes dot-pulse {
      0%, 100% { fill: rgba(0,229,255,0.2); }
      50% { fill: rgba(0,229,255,0.7); }
    }
    .status { animation: dot-pulse 2s infinite ease-in-out; }

    /* Subtle panel inner border glow */
    @keyframes panel-glow {
      0%, 100% { stroke: rgba(0,229,255,0.06); }
      50% { stroke: rgba(0,229,255,0.12); }
    }
    .panel-inner {
      fill: none;
      stroke: rgba(0,229,255,0.04);
      stroke-width: 0.5;
      animation: panel-glow 4s infinite ease-in-out;
    }
  </style>

  <rect class="bg" width="420" height="220" rx="12"/>
  <rect fill="url(#lcd-glow)" width="420" height="220" rx="12" opacity="0.5"/>

  <!-- Inner panel border -->
  <rect class="panel-inner" x="15" y="15" width="390" height="190" rx="8"/>

  <!-- Scanning line -->
  <rect class="scanline" x="20" y="0" width="380" height="2" rx="1" fill="#00E5FF"/>

  <!-- Status dot -->
  <circle class="status" cx="395" cy="28" r="3"/>

  <!-- Ghost digits (LCD "off" segments for depth) -->
  <text class="time-digit-dim" x="48" y="108">88:88</text>

  <!-- Hours and Minutes — static display -->
  <text class="time-digit" x="48" y="108" filter="url(#text-glow)">06</text>

  <!-- Colon 1 -->
  <text class="time-digit colon" x="148" y="108" filter="url(#text-glow)">:</text>

  <!-- Minutes -->
  <text class="time-digit" x="175" y="108" filter="url(#text-glow)">13</text>

  <!-- Seconds separator -->
  <text class="time-sec colon" x="283" y="104" style="font-size:32px;" filter="url(#text-glow)">:</text>

  <!-- Seconds tens digit — animated 0→5 over 60s -->
  <g filter="url(#text-glow)">
    <text class="time-sec t0" x="300" y="104">0</text>
    <text class="time-sec t1" x="300" y="104" style="opacity:0">1</text>
    <text class="time-sec t2" x="300" y="104" style="opacity:0">2</text>
    <text class="time-sec t3" x="300" y="104" style="opacity:0">3</text>
    <text class="time-sec t4" x="300" y="104" style="opacity:0">4</text>
    <text class="time-sec t5" x="300" y="104" style="opacity:0">5</text>
  </g>

  <!-- Seconds ones digit — animated 0→9 over 10s -->
  <g filter="url(#text-glow)">
    <text class="time-sec s0" x="322" y="104">0</text>
    <text class="time-sec s1" x="322" y="104" style="opacity:0">1</text>
    <text class="time-sec s2" x="322" y="104" style="opacity:0">2</text>
    <text class="time-sec s3" x="322" y="104" style="opacity:0">3</text>
    <text class="time-sec s4" x="322" y="104" style="opacity:0">4</text>
    <text class="time-sec s5" x="322" y="104" style="opacity:0">5</text>
    <text class="time-sec s6" x="322" y="104" style="opacity:0">6</text>
    <text class="time-sec s7" x="322" y="104" style="opacity:0">7</text>
    <text class="time-sec s8" x="322" y="104" style="opacity:0">8</text>
    <text class="time-sec s9" x="322" y="104" style="opacity:0">9</text>
  </g>

  <!-- AM/PM indicator -->
  <text x="352" y="97" style="font-family:'Consolas',monospace;font-size:14px;fill:#00E5FF;opacity:0.5;">AM</text>

  <!-- Bottom label -->
  <text class="label" x="90" y="168">indian standard time</text>

  <!-- Subtle decorative lines -->
  <line x1="48" y1="145" x2="362" y2="145" stroke="rgba(0,229,255,0.04)" stroke-width="0.5"/>
  <line x1="48" y1="60" x2="362" y2="60" stroke="rgba(0,229,255,0.04)" stroke-width="0.5"/>

  <!-- Corner accents -->
  <rect x="22" y="22" width="6" height="6" rx="1" fill="rgba(0,229,255,0.04)" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <rect x="392" y="22" width="6" height="6" rx="1" fill="rgba(0,229,255,0.04)" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <rect x="22" y="192" width="6" height="6" rx="1" fill="rgba(0,229,255,0.04)" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <rect x="392" y="192" width="6" height="6" rx="1" fill="rgba(0,229,255,0.04)" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
</svg>

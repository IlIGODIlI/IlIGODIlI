<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220">
  <defs>
    <radialGradient id="lcd-glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </radialGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');

    .bg { fill: #0b0f19; stroke: rgba(0,229,255,0.08); stroke-width: 1; }

    /* Panel glow */
    @keyframes panel-glow {
      0%, 100% { stroke: rgba(0,229,255,0.06); }
      50% { stroke: rgba(0,229,255,0.12); }
    }
    .panel-inner {
      fill: none;
      stroke: rgba(0,229,255,0.04);
      stroke-width: 0.5;
      animation: panel-glow 4s infinite ease-in-out;
    }

    /* Status dot */
    @keyframes dot-pulse {
      0%, 100% { fill: rgba(0,229,255,0.3); }
      50% { fill: rgba(0,229,255,0.8); }
    }
    .status-dot { animation: dot-pulse 2s infinite ease-in-out; filter: url(#glow); }

    /* Bottom accent line pulse */
    @keyframes accent-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }
    .accent-line { animation: accent-pulse 4s infinite ease-in-out; }

    /* Text digits styling */
    .time-digit {
      font-family: 'Press Start 2P', monospace;
      font-size: 26px;
      fill: #00E5FF;
      font-weight: bold;
      dominant-baseline: central;
    }

    .time-digit-dim {
      font-family: 'Press Start 2P', monospace;
      font-size: 26px;
      fill: #0a1828;
      font-weight: bold;
      dominant-baseline: central;
      opacity: 0.15;
    }

    /* Colons Blink */
    @keyframes colon-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.15; }
    }
    .colon { animation: colon-blink 1s infinite steps(1); }

    /* Seconds ONES digit animation with scramble delay (scramble runs for 0.24s) */
    @keyframes s0 { 0%, 2.4% { opacity: 0; } 2.41%, 10% { opacity: 1; } 10.01%, 100% { opacity: 0; } }
    @keyframes s1 { 0%, 10% { opacity: 0; } 10.01%, 12.4% { opacity: 0; } 12.41%, 20% { opacity: 1; } 20.01%, 100% { opacity: 0; } }
    @keyframes s2 { 0%, 20% { opacity: 0; } 20.01%, 22.4% { opacity: 0; } 22.41%, 30% { opacity: 1; } 30.01%, 100% { opacity: 0; } }
    @keyframes s3 { 0%, 30% { opacity: 0; } 30.01%, 32.4% { opacity: 0; } 32.41%, 40% { opacity: 1; } 40.01%, 100% { opacity: 0; } }
    @keyframes s4 { 0%, 40% { opacity: 0; } 40.01%, 42.4% { opacity: 0; } 42.41%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
    @keyframes s5 { 0%, 50% { opacity: 0; } 50.01%, 52.4% { opacity: 0; } 52.41%, 60% { opacity: 1; } 60.01%, 100% { opacity: 0; } }
    @keyframes s6 { 0%, 60% { opacity: 0; } 60.01%, 62.4% { opacity: 0; } 62.41%, 70% { opacity: 1; } 70.01%, 100% { opacity: 0; } }
    @keyframes s7 { 0%, 70% { opacity: 0; } 70.01%, 72.4% { opacity: 0; } 72.41%, 80% { opacity: 1; } 80.01%, 100% { opacity: 0; } }
    @keyframes s8 { 0%, 80% { opacity: 0; } 80.01%, 82.4% { opacity: 0; } 82.41%, 90% { opacity: 1; } 90.01%, 100% { opacity: 0; } }
    @keyframes s9 { 0%, 90% { opacity: 0; } 90.01%, 92.4% { opacity: 0; } 92.41%, 100% { opacity: 1; } }

    .sec-s0{animation:s0 10s infinite} .sec-s1{animation:s1 10s infinite}
    .sec-s2{animation:s2 10s infinite} .sec-s3{animation:s3 10s infinite}
    .sec-s4{animation:s4 10s infinite} .sec-s5{animation:s5 10s infinite}
    .sec-s6{animation:s6 10s infinite} .sec-s7{animation:s7 10s infinite}
    .sec-s8{animation:s8 10s infinite} .sec-s9{animation:s9 10s infinite}

    /* Seconds TENS digit animation with scramble delay (scramble runs for 0.24s) */
    @keyframes t0 { 0%, 0.4% { opacity: 0; } 0.41%, 16.66% { opacity: 1; } 16.67%, 100% { opacity: 0; } }
    @keyframes t1 { 0%, 16.66% { opacity: 0; } 16.67%, 17.07% { opacity: 0; } 17.07%, 33.33% { opacity: 1; } 33.34%, 100% { opacity: 0; } }
    @keyframes t2 { 0%, 33.33% { opacity: 0; } 33.34%, 33.74% { opacity: 0; } 33.74%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
    @keyframes t3 { 0%, 50% { opacity: 0; } 50.01%, 50.41% { opacity: 0; } 50.41%, 66.66% { opacity: 1; } 66.67%, 100% { opacity: 0; } }
    @keyframes t4 { 0%, 66.66% { opacity: 0; } 66.67%, 67.07% { opacity: 0; } 67.07%, 83.33% { opacity: 1; } 83.34%, 100% { opacity: 0; } }
    @keyframes t5 { 0%, 83.33% { opacity: 0; } 83.34%, 83.74% { opacity: 0; } 83.74%, 100% { opacity: 1; } }

    .sec-t0{animation:t0 60s infinite} .sec-t1{animation:t1 60s infinite}
    .sec-t2{animation:t2 60s infinite} .sec-t3{animation:t3 60s infinite}
    .sec-t4{animation:t4 60s infinite} .sec-t5{animation:t5 60s infinite}

    /* Scramble overlay animations (period of 1s) */
    @keyframes scram-1 { 0%, 6% { opacity: 1; } 6.01%, 100% { opacity: 0; } }
    @keyframes scram-2 { 0%, 6% { opacity: 0; } 6.01%, 12% { opacity: 1; } 12.01%, 100% { opacity: 0; } }
    @keyframes scram-3 { 0%, 12% { opacity: 0; } 12.01%, 18% { opacity: 1; } 18.01%, 100% { opacity: 0; } }
    @keyframes scram-4 { 0%, 18% { opacity: 0; } 18.01%, 24% { opacity: 1; } 24.01%, 100% { opacity: 0; } }

    .sc1 { animation: scram-1 1s infinite step-end; }
    .sc2 { animation: scram-2 1s infinite step-end; }
    .sc3 { animation: scram-3 1s infinite step-end; }
    .sc4 { animation: scram-4 1s infinite step-end; }

    .label {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 9px;
      fill: #2a3a4a;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>

  <rect class="bg" width="420" height="220" rx="12"/>
  <rect fill="url(#lcd-glow)" width="420" height="220" rx="12" opacity="0.6"/>

  <!-- Inner panel border -->
  <rect class="panel-inner" x="15" y="15" width="390" height="190" rx="8"/>

  <!-- Status dot -->
  <circle class="status-dot" cx="395" cy="24" r="3"/>

  <!-- Corner accents -->
  <rect x="22" y="22" width="6" height="6" rx="1" fill="rgba(0,229,255,0.04)" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <rect x="392" y="22" width="6" height="6" rx="1" fill="rgba(0,229,255,0.04)" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <rect x="22" y="192" width="6" height="6" rx="1" fill="rgba(0,229,255,0.04)" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <rect x="392" y="192" width="6" height="6" rx="1" fill="rgba(0,229,255,0.04)" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>

  <!-- Ghost Background digits (LCD "off" segments) -->
  <text class="time-digit-dim" x="210" y="105" text-anchor="middle">88:88:88 AM</text>

  <!-- Hours: 10 -->
  <g filter="url(#glow)">
    <text class="time-digit" x="60" y="105" text-anchor="middle">1</text>
    <text class="time-digit" x="90" y="105" text-anchor="middle">0</text>
  </g>

  <!-- Colon 1 -->
  <g class="colon" filter="url(#glow)">
    <text class="time-digit" x="120" y="105" text-anchor="middle">:</text>
  </g>

  <!-- Minutes: 14 -->
  <g filter="url(#glow)">
    <text class="time-digit" x="150" y="105" text-anchor="middle">1</text>
    <text class="time-digit" x="180" y="105" text-anchor="middle">4</text>
  </g>

  <!-- Colon 2 -->
  <g class="colon" filter="url(#glow)">
    <text class="time-digit" x="210" y="105" text-anchor="middle">:</text>
  </g>

  <!-- ================= SECONDS DIGITS (With shuffle animations) ================= -->
  <!-- Tens Digit (0-5) at x=240 -->
  <g filter="url(#glow)">
    <text class="time-digit sec-t0" x="240" y="105" text-anchor="middle">0</text>
    <text class="time-digit sec-t1" x="240" y="105" text-anchor="middle" style="opacity:0">1</text>
    <text class="time-digit sec-t2" x="240" y="105" text-anchor="middle" style="opacity:0">2</text>
    <text class="time-digit sec-t3" x="240" y="105" text-anchor="middle" style="opacity:0">3</text>
    <text class="time-digit sec-t4" x="240" y="105" text-anchor="middle" style="opacity:0">4</text>
    <text class="time-digit sec-t5" x="240" y="105" text-anchor="middle" style="opacity:0">5</text>
  </g>

  <!-- Ones Digit (0-9) at x=270 -->
  <g filter="url(#glow)">
    <text class="time-digit sec-s0" x="270" y="105" text-anchor="middle">0</text>
    <text class="time-digit sec-s1" x="270" y="105" text-anchor="middle" style="opacity:0">1</text>
    <text class="time-digit sec-s2" x="270" y="105" text-anchor="middle" style="opacity:0">2</text>
    <text class="time-digit sec-s3" x="270" y="105" text-anchor="middle" style="opacity:0">3</text>
    <text class="time-digit sec-s4" x="270" y="105" text-anchor="middle" style="opacity:0">4</text>
    <text class="time-digit sec-s5" x="270" y="105" text-anchor="middle" style="opacity:0">5</text>
    <text class="time-digit sec-s6" x="270" y="105" text-anchor="middle" style="opacity:0">6</text>
    <text class="time-digit sec-s7" x="270" y="105" text-anchor="middle" style="opacity:0">7</text>
    <text class="time-digit sec-s8" x="270" y="105" text-anchor="middle" style="opacity:0">8</text>
    <text class="time-digit sec-s9" x="270" y="105" text-anchor="middle" style="opacity:0">9</text>
  </g>

  <!-- Ones Digit Scramble Overlay (Flashes every 1 second) -->
  <g filter="url(#glow)">
    <text class="time-digit sc1" x="270" y="105" text-anchor="middle">#</text>
    <text class="time-digit sc2" x="270" y="105" text-anchor="middle" style="opacity:0">%</text>
    <text class="time-digit sc3" x="270" y="105" text-anchor="middle" style="opacity:0">9</text>
    <text class="time-digit sc4" x="270" y="105" text-anchor="middle" style="opacity:0">&amp;</text>
  </g>

  <!-- AM/PM Indicator -->
  <g filter="url(#glow)">
    <text class="time-digit" x="315" y="105" text-anchor="middle" style="font-size: 26px;">A</text>
    <text class="time-digit" x="345" y="105" text-anchor="middle" style="font-size: 26px;">M</text>
  </g>

  <!-- Bottom accent line -->
  <rect class="accent-line" x="48" y="195" width="324" height="1.5" rx="0.75" fill="#00E5FF" opacity="0.4"/>

  <!-- Bottom label -->
  <text class="label" x="48" y="210">clock</text>
</svg>

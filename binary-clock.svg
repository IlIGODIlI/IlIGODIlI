<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220">
  <defs>
    <radialGradient id="lcd-glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </radialGradient>
    
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 7-Segment paths definitions (no fill defined so <use> cascades successfully) -->
    <path id="seg-a" d="M 4,2 L 28,2 L 25,5 L 7,5 Z" />
    <path id="seg-b" d="M 29,4 L 29,25 L 26,22 L 26,7 Z" />
    <path id="seg-c" d="M 29,27 L 29,48 L 26,45 L 26,30 Z" />
    <path id="seg-d" d="M 4,50 L 28,50 L 25,47 L 7,47 Z" />
    <path id="seg-e" d="M 3,27 L 3,48 L 6,45 L 6,30 Z" />
    <path id="seg-f" d="M 3,4 L 3,25 L 6,22 L 6,7 Z" />
    <path id="seg-g" d="M 5,26 L 8,24 L 24,24 L 27,26 L 24,28 L 8,28 Z" />

    <!-- 7-Segment digit definitions -->
    <g id="digit-0">
      <use href="#seg-a" class="seg-lit" />
      <use href="#seg-b" class="seg-lit" />
      <use href="#seg-c" class="seg-lit" />
      <use href="#seg-d" class="seg-lit" />
      <use href="#seg-e" class="seg-lit" />
      <use href="#seg-f" class="seg-lit" />
      <use href="#seg-g" class="seg-dim" />
    </g>
    <g id="digit-1">
      <use href="#seg-a" class="seg-dim" />
      <use href="#seg-b" class="seg-lit" />
      <use href="#seg-c" class="seg-lit" />
      <use href="#seg-d" class="seg-dim" />
      <use href="#seg-e" class="seg-dim" />
      <use href="#seg-f" class="seg-dim" />
      <use href="#seg-g" class="seg-dim" />
    </g>
    <g id="digit-2">
      <use href="#seg-a" class="seg-lit" />
      <use href="#seg-b" class="seg-lit" />
      <use href="#seg-c" class="seg-dim" />
      <use href="#seg-d" class="seg-lit" />
      <use href="#seg-e" class="seg-lit" />
      <use href="#seg-f" class="seg-dim" />
      <use href="#seg-g" class="seg-lit" />
    </g>
    <g id="digit-3">
      <use href="#seg-a" class="seg-lit" />
      <use href="#seg-b" class="seg-lit" />
      <use href="#seg-c" class="seg-lit" />
      <use href="#seg-d" class="seg-lit" />
      <use href="#seg-e" class="seg-dim" />
      <use href="#seg-f" class="seg-dim" />
      <use href="#seg-g" class="seg-lit" />
    </g>
    <g id="digit-4">
      <use href="#seg-a" class="seg-dim" />
      <use href="#seg-b" class="seg-lit" />
      <use href="#seg-c" class="seg-lit" />
      <use href="#seg-d" class="seg-dim" />
      <use href="#seg-e" class="seg-dim" />
      <use href="#seg-f" class="seg-lit" />
      <use href="#seg-g" class="seg-lit" />
    </g>
    <g id="digit-5">
      <use href="#seg-a" class="seg-lit" />
      <use href="#seg-b" class="seg-dim" />
      <use href="#seg-c" class="seg-lit" />
      <use href="#seg-d" class="seg-lit" />
      <use href="#seg-e" class="seg-dim" />
      <use href="#seg-f" class="seg-lit" />
      <use href="#seg-g" class="seg-lit" />
    </g>
    <g id="digit-6">
      <use href="#seg-a" class="seg-lit" />
      <use href="#seg-b" class="seg-dim" />
      <use href="#seg-c" class="seg-lit" />
      <use href="#seg-d" class="seg-lit" />
      <use href="#seg-e" class="seg-lit" />
      <use href="#seg-f" class="seg-lit" />
      <use href="#seg-g" class="seg-lit" />
    </g>
    <g id="digit-7">
      <use href="#seg-a" class="seg-lit" />
      <use href="#seg-b" class="seg-lit" />
      <use href="#seg-c" class="seg-lit" />
      <use href="#seg-d" class="seg-dim" />
      <use href="#seg-e" class="seg-dim" />
      <use href="#seg-f" class="seg-dim" />
      <use href="#seg-g" class="seg-dim" />
    </g>
    <g id="digit-8">
      <use href="#seg-a" class="seg-lit" />
      <use href="#seg-b" class="seg-lit" />
      <use href="#seg-c" class="seg-lit" />
      <use href="#seg-d" class="seg-lit" />
      <use href="#seg-e" class="seg-lit" />
      <use href="#seg-f" class="seg-lit" />
      <use href="#seg-g" class="seg-lit" />
    </g>
    <g id="digit-9">
      <use href="#seg-a" class="seg-lit" />
      <use href="#seg-b" class="seg-lit" />
      <use href="#seg-c" class="seg-lit" />
      <use href="#seg-d" class="seg-lit" />
      <use href="#seg-e" class="seg-dim" />
      <use href="#seg-f" class="seg-lit" />
      <use href="#seg-g" class="seg-lit" />
    </g>
  </defs>

  <style>
    .bg { fill: #0b0f19; stroke: rgba(0,229,255,0.08); stroke-width: 1; }

    /* Segment Styles */
    .seg-lit {
      fill: #00E5FF;
      filter: url(#glow);
    }
    .seg-dim {
      fill: #06111a;
      opacity: 0.15;
    }

    /* Colons Blink */
    @keyframes colon-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.15; }
    }
    .colon { animation: colon-blink 1s infinite steps(1); }

    /* Seconds ONES digit — cycles 0→9 over 10s */
    @keyframes s0 { 0%,10%{opacity:1} 10.01%,100%{opacity:0} }
    @keyframes s1 { 0%,10%{opacity:0} 10.01%,20%{opacity:1} 20.01%,100%{opacity:0} }
    @keyframes s2 { 0%,20%{opacity:0} 20.01%,30%{opacity:1} 30.01%,100%{opacity:0} }
    @keyframes s3 { 0%,30%{opacity:0} 30.01%,40%{opacity:1} 40.01%,100%{opacity:0} }
    @keyframes s4 { 0%,40%{opacity:0} 40.01%,50%{opacity:1} 50.01%,100%{opacity:0} }
    @keyframes s5 { 0%,50%{opacity:0} 50.01%,60%{opacity:1} 60.01%,100%{opacity:0} }
    @keyframes s6 { 0%,60%{opacity:0} 60.01%,70%{opacity:1} 70.01%,100%{opacity:0} }
    @keyframes s7 { 0%,70%{opacity:0} 70.01%,80%{opacity:1} 80.01%,100%{opacity:0} }
    @keyframes s8 { 0%,80%{opacity:0} 80.01%,90%{opacity:1} 90.01%,100%{opacity:0} }
    @keyframes s9 { 0%,90%{opacity:0} 90.01%,100%{opacity:1} }

    .sec-s0{animation:s0 10s infinite} .sec-s1{animation:s1 10s infinite}
    .sec-s2{animation:s2 10s infinite} .sec-s3{animation:s3 10s infinite}
    .sec-s4{animation:s4 10s infinite} .sec-s5{animation:s5 10s infinite}
    .sec-s6{animation:s6 10s infinite} .sec-s7{animation:s7 10s infinite}
    .sec-s8{animation:s8 10s infinite} .sec-s9{animation:s9 10s infinite}

    /* Seconds TENS digit — cycles 0→5 over 60s */
    @keyframes t0 { 0%,16.66%{opacity:1} 16.67%,100%{opacity:0} }
    @keyframes t1 { 0%,16.66%{opacity:0} 16.67%,33.33%{opacity:1} 33.34%,100%{opacity:0} }
    @keyframes t2 { 0%,33.33%{opacity:0} 33.34%,50%{opacity:1} 50.01%,100%{opacity:0} }
    @keyframes t3 { 0%,50%{opacity:0} 50.01%,66.66%{opacity:1} 66.67%,100%{opacity:0} }
    @keyframes t4 { 0%,66.66%{opacity:0} 66.67%,83.33%{opacity:1} 83.34%,100%{opacity:0} }
    @keyframes t5 { 0%,83.33%{opacity:0} 83.34%,100%{opacity:1} }

    .sec-t0{animation:t0 60s infinite} .sec-t1{animation:t1 60s infinite}
    .sec-t2{animation:t2 60s infinite} .sec-t3{animation:t3 60s infinite}
    .sec-t4{animation:t4 60s infinite} .sec-t5{animation:t5 60s infinite}

    .label {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 10px;
      fill: #00E5FF;
      opacity: 0.35;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    /* Ambient scanning line */
    @keyframes scanline {
      0% { transform: translateY(-20px); opacity: 0; }
      10%, 90% { opacity: 0.06; }
      100% { transform: translateY(220px); opacity: 0; }
    }
    .scanline {
      animation: scanline 6s infinite linear;
    }

    /* Status dot */
    @keyframes dot-pulse {
      0%, 100% { fill: rgba(0,229,255,0.2); }
      50% { fill: rgba(0,229,255,0.7); }
    }
    .status { animation: dot-pulse 2s infinite ease-in-out; filter: url(#glow); }

    /* Panel glow */
    @keyframes panel-glow {
      0%, 100% { stroke: rgba(0,229,255,0.06); }
      50% { stroke: rgba(0,229,255,0.12); }
    }
    .panel-inner {
      fill: none;
      stroke: rgba(0,229,255,0.04);
      stroke-width: 0.5;
      animation: panel-glow 4s infinite ease-in-out;
    }
  </style>

  <rect class="bg" width="420" height="220" rx="12"/>
  <rect fill="url(#lcd-glow)" width="420" height="220" rx="12" opacity="0.5"/>

  <!-- Inner panel border -->
  <rect class="panel-inner" x="15" y="15" width="390" height="190" rx="8"/>

  <!-- Scanning line -->
  <rect class="scanline" x="20" y="0" width="380" height="2" rx="1" fill="#00E5FF"/>

  <!-- Status dot -->
  <circle class="status" cx="395" cy="28" r="3"/>

  <!-- Corner accents -->
  <rect x="22" y="22" width="6" height="6" rx="1" fill="rgba(0,229,255,0.04)" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <rect x="392" y="22" width="6" height="6" rx="1" fill="rgba(0,229,255,0.04)" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <rect x="22" y="192" width="6" height="6" rx="1" fill="rgba(0,229,255,0.04)" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
  <rect x="392" y="192" width="6" height="6" rx="1" fill="rgba(0,229,255,0.04)" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>

  <!-- ================= TIME DIGITS (7-Segment Layout) ================= -->
  <!-- Centered at y=84, height=52. Total width=276, centered (starts at x=72) -->

  <!-- Hours: 06 -->
  <g transform="translate(72, 84)">
    <use href="#digit-0" />
  </g>
  <g transform="translate(112, 84)">
    <use href="#digit-6" />
  </g>

  <!-- Colon 1 -->
  <g class="colon" filter="url(#glow)">
    <circle cx="159" cy="100" r="2" fill="#00E5FF" />
    <circle cx="159" cy="120" r="2" fill="#00E5FF" />
  </g>

  <!-- Minutes: 13 -->
  <g transform="translate(174, 84)">
    <use href="#digit-1" />
  </g>
  <g transform="translate(214, 84)">
    <use href="#digit-3" />
  </g>

  <!-- Colon 2 -->
  <g class="colon" filter="url(#glow)">
    <circle cx="261" cy="100" r="2" fill="#00E5FF" />
    <circle cx="261" cy="120" r="2" fill="#00E5FF" />
  </g>

  <!-- Seconds: Animated! -->
  <!-- Tens Digit (0-5) at x=276 -->
  <g transform="translate(276, 84)">
    <use href="#digit-0" class="sec-t0" />
    <use href="#digit-1" class="sec-t1" style="opacity:0" />
    <use href="#digit-2" class="sec-t2" style="opacity:0" />
    <use href="#digit-3" class="sec-t3" style="opacity:0" />
    <use href="#digit-4" class="sec-t4" style="opacity:0" />
    <use href="#digit-5" class="sec-t5" style="opacity:0" />
  </g>

  <!-- Ones Digit (0-9) at x=316 -->
  <g transform="translate(316, 84)">
    <use href="#digit-0" class="sec-s0" />
    <use href="#digit-1" class="sec-s1" style="opacity:0" />
    <use href="#digit-2" class="sec-s2" style="opacity:0" />
    <use href="#digit-3" class="sec-s3" style="opacity:0" />
    <use href="#digit-4" class="sec-s4" style="opacity:0" />
    <use href="#digit-5" class="sec-s5" style="opacity:0" />
    <use href="#digit-6" class="sec-s6" style="opacity:0" />
    <use href="#digit-7" class="sec-s7" style="opacity:0" />
    <use href="#digit-8" class="sec-s8" style="opacity:0" />
    <use href="#digit-9" class="sec-s9" style="opacity:0" />
  </g>

  <!-- AM/PM Indicator -->
  <text x="358" y="99" style="font-family:'Consolas',monospace;font-size:12px;fill:#00E5FF;font-weight:bold;opacity:0.6;" filter="url(#glow)">AM</text>

  <!-- Bottom label -->
  <text class="label" x="210" y="174" text-anchor="middle">indian standard time</text>

  <!-- Decorative horizontal lines (matching the original) -->
  <line x1="48" y1="150" x2="362" y2="150" stroke="rgba(0,229,255,0.04)" stroke-width="0.5"/>
  <line x1="48" y1="60" x2="362" y2="60" stroke="rgba(0,229,255,0.04)" stroke-width="0.5"/>
</svg>

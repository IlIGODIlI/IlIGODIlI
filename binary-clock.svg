<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220">
  <defs>
    <filter id="dot-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Radial vignette gradient -->
    <radialGradient id="vignette" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </radialGradient>
  </defs>
  <style>
    .bg {
      fill: #0b0f19;
      stroke: rgba(0, 229, 255, 0.08);
      stroke-width: 1;
    }

    .panel-title {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11px;
      fill: #00E5FF;
      letter-spacing: 2px;
    }

    .col-label {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 9px;
      fill: #1a2a3a;
      letter-spacing: 1px;
      text-anchor: middle;
    }

    .dot {
      fill: #161b22;
      rx: 3;
    }

    /* Binary pulse animations at different frequencies */
    @keyframes pulse-1s {
      0%, 49% { fill: #161b22; }
      50%, 100% { fill: #00E5FF; }
    }
    @keyframes pulse-2s {
      0%, 49% { fill: #161b22; }
      50%, 100% { fill: #00E5FF; }
    }
    @keyframes pulse-4s {
      0%, 49% { fill: #161b22; }
      50%, 100% { fill: #00E5FF; }
    }
    @keyframes pulse-8s {
      0%, 49% { fill: #161b22; }
      50%, 100% { fill: #00E5FF; }
    }
    @keyframes pulse-10s {
      0%, 49% { fill: #161b22; }
      50%, 100% { fill: #00E5FF; }
    }
    @keyframes pulse-20s {
      0%, 49% { fill: #161b22; }
      50%, 100% { fill: #00E5FF; }
    }
    @keyframes pulse-40s {
      0%, 49% { fill: #161b22; }
      50%, 100% { fill: #00E5FF; }
    }
    @keyframes pulse-60s {
      0%, 49% { fill: #161b22; }
      50%, 100% { fill: #00E5FF; }
    }
    @keyframes pulse-120s {
      0%, 49% { fill: #161b22; }
      50%, 100% { fill: #00E5FF; }
    }
    @keyframes pulse-240s {
      0%, 49% { fill: #161b22; }
      50%, 100% { fill: #00E5FF; }
    }
    @keyframes pulse-480s {
      0%, 49% { fill: #161b22; }
      50%, 100% { fill: #00E5FF; }
    }

    /* Seconds unit (1s, 2s, 4s, 8s) */
    .s-u0 { animation: pulse-1s 1s infinite steps(1); }
    .s-u1 { animation: pulse-2s 2s infinite steps(1); }
    .s-u2 { animation: pulse-4s 4s infinite steps(1); }
    .s-u3 { animation: pulse-8s 8s infinite steps(1); }

    /* Seconds tens (10s, 20s, 40s) */
    .s-t0 { animation: pulse-10s 10s infinite steps(1); }
    .s-t1 { animation: pulse-20s 20s infinite steps(1); }
    .s-t2 { animation: pulse-40s 40s infinite steps(1); }

    /* Minutes unit (60s, 120s, 240s, 480s) */
    .m-u0 { animation: pulse-60s 60s infinite steps(1); }
    .m-u1 { animation: pulse-120s 120s infinite steps(1); }
    .m-u2 { animation: pulse-240s 240s infinite steps(1); }
    .m-u3 { animation: pulse-480s 480s infinite steps(1); }

    /* Sweep glow traveling across columns */
    @keyframes sweep {
      0%, 100% { opacity: 0; }
      8%, 12% { opacity: 0.6; }
      20% { opacity: 0; }
    }

    .sweep-1 { animation: sweep 10s infinite ease-in-out; animation-delay: 0s; }
    .sweep-2 { animation: sweep 10s infinite ease-in-out; animation-delay: 0.8s; }
    .sweep-3 { animation: sweep 10s infinite ease-in-out; animation-delay: 1.6s; }
    .sweep-4 { animation: sweep 10s infinite ease-in-out; animation-delay: 2.4s; }
    .sweep-5 { animation: sweep 10s infinite ease-in-out; animation-delay: 3.2s; }
    .sweep-6 { animation: sweep 10s infinite ease-in-out; animation-delay: 4.0s; }

    /* Orbital ring animation */
    @keyframes orbit-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .orbit {
      fill: none;
      stroke: rgba(0, 229, 255, 0.06);
      stroke-width: 0.8;
      stroke-dasharray: 4 8;
    }

    .orbit-dot {
      fill: #00E5FF;
      animation: orbit-spin 8s linear infinite;
      transform-origin: 210px 35px;
    }

    /* Colon blink */
    @keyframes colon-blink {
      0%, 49% { fill: #00E5FF; opacity: 0.8; }
      50%, 100% { fill: #00E5FF; opacity: 0.15; }
    }
    .colon-dot {
      animation: colon-blink 1s infinite steps(1);
    }

    /* Ambient status dot */
    @keyframes status-breathe {
      0%, 100% { fill: rgba(0, 229, 255, 0.2); }
      50% { fill: rgba(0, 229, 255, 0.7); }
    }
    .status-dot { animation: status-breathe 2s infinite ease-in-out; }
  </style>

  <rect class="bg" width="420" height="220" rx="12" />

  <!-- Subtle inner glow -->
  <rect fill="url(#vignette)" width="420" height="220" rx="12" opacity="0.3"/>

  <!-- Header -->
  <text class="panel-title" x="30" y="32">BINARY ATOMIC CLOCK</text>
  <circle class="status-dot" cx="390" cy="28" r="3"/>

  <!-- Orbital decorative rings around header area -->
  <ellipse class="orbit" cx="210" cy="35" rx="185" ry="12"/>
  <ellipse class="orbit" cx="210" cy="35" rx="195" ry="8" style="stroke-dasharray: 2 12;"/>

  <!-- Column sweep glow bars -->
  <rect class="sweep-1" x="95" y="55" width="30" height="120" rx="4" fill="#00E5FF" opacity="0"/>
  <rect class="sweep-2" x="130" y="55" width="30" height="120" rx="4" fill="#00E5FF" opacity="0"/>
  <rect class="sweep-3" x="175" y="55" width="30" height="120" rx="4" fill="#00E5FF" opacity="0"/>
  <rect class="sweep-4" x="210" y="55" width="30" height="120" rx="4" fill="#00E5FF" opacity="0"/>
  <rect class="sweep-5" x="255" y="55" width="30" height="120" rx="4" fill="#00E5FF" opacity="0"/>
  <rect class="sweep-6" x="290" y="55" width="30" height="120" rx="4" fill="#00E5FF" opacity="0"/>

  <!-- Clock Dot Matrix Grid -->
  <g transform="translate(100, 60)">
    <!-- Column 1: Hours tens (H1) — 2 dots -->
    <rect class="dot" x="0" y="50" width="22" height="22" />
    <rect class="dot" x="0" y="80" width="22" height="22" />

    <!-- Colon separator -->

    <!-- Column 2: Hours unit (H2) — 4 dots -->
    <rect class="dot" x="35" y="0" width="22" height="22" />
    <rect class="dot" x="35" y="30" width="22" height="22" />
    <rect class="dot" x="35" y="60" width="22" height="22" />
    <rect class="dot" x="35" y="90" width="22" height="22" />

    <!-- Colon between H and M -->
    <circle class="colon-dot" cx="72" cy="40" r="3"/>
    <circle class="colon-dot" cx="72" cy="75" r="3"/>

    <!-- Column 3: Minutes tens (M1) — 3 dots -->
    <rect class="dot m-u3" x="80" y="20" width="22" height="22" />
    <rect class="dot m-u2" x="80" y="50" width="22" height="22" />
    <rect class="dot m-u1" x="80" y="80" width="22" height="22" />

    <!-- Column 4: Minutes unit (M2) — 4 dots -->
    <rect class="dot m-u0" x="115" y="0" width="22" height="22" />
    <rect class="dot" x="115" y="30" width="22" height="22" />
    <rect class="dot" x="115" y="60" width="22" height="22" />
    <rect class="dot" x="115" y="90" width="22" height="22" />

    <!-- Colon between M and S -->
    <circle class="colon-dot" cx="152" cy="40" r="3" style="animation-delay: 0.1s;"/>
    <circle class="colon-dot" cx="152" cy="75" r="3" style="animation-delay: 0.1s;"/>

    <!-- Column 5: Seconds tens (S1) — 3 dots -->
    <rect class="dot s-t2" x="160" y="20" width="22" height="22" />
    <rect class="dot s-t1" x="160" y="50" width="22" height="22" />
    <rect class="dot s-t0" x="160" y="80" width="22" height="22" />

    <!-- Column 6: Seconds unit (S2) — 4 dots -->
    <rect class="dot s-u3" x="195" y="0" width="22" height="22" />
    <rect class="dot s-u2" x="195" y="30" width="22" height="22" />
    <rect class="dot s-u1" x="195" y="60" width="22" height="22" />
    <rect class="dot s-u0" x="195" y="90" width="22" height="22" />
  </g>

  <!-- Column labels -->
  <g transform="translate(100, 180)">
    <text class="col-label" x="11" y="0">H</text>
    <text class="col-label" x="46" y="0">H</text>
    <text class="col-label" x="91" y="0">M</text>
    <text class="col-label" x="126" y="0">M</text>
    <text class="col-label" x="171" y="0">S</text>
    <text class="col-label" x="206" y="0">S</text>
  </g>

  <!-- Bottom row labels -->
  <g transform="translate(100, 195)">
    <text class="col-label" x="11" y="0" style="font-size:7px; fill:#0d1a2a;">10</text>
    <text class="col-label" x="46" y="0" style="font-size:7px; fill:#0d1a2a;">1</text>
    <text class="col-label" x="91" y="0" style="font-size:7px; fill:#0d1a2a;">10</text>
    <text class="col-label" x="126" y="0" style="font-size:7px; fill:#0d1a2a;">1</text>
    <text class="col-label" x="171" y="0" style="font-size:7px; fill:#0d1a2a;">10</text>
    <text class="col-label" x="206" y="0" style="font-size:7px; fill:#0d1a2a;">1</text>
  </g>
</svg>

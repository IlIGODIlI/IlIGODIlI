<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&amp;family=JetBrains+Mono&amp;display=swap');
    
    .bg {
      fill: #0b0f19;
      stroke: rgba(0, 229, 255, 0.08);
      stroke-width: 1;
      rx: 12px;
    }
    .panel-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      fill: #00E5FF;
      letter-spacing: 2px;
    }
    .dot {
      fill: #161b22;
      transition: fill 0.3s;
      rx: 2px;
    }
    
    /* Simulate binary clock ticking states */
    @keyframes tick-1 { 0%, 100% { fill: #161b22; } 50% { fill: #00E5FF; filter: drop-shadow(0 0 4px #00E5FF); } }
    @keyframes tick-2 { 0%, 80% { fill: #161b22; } 40% { fill: #00E5FF; filter: drop-shadow(0 0 4px #00E5FF); } }
    @keyframes tick-3 { 0%, 60% { fill: #161b22; } 30% { fill: #00E5FF; filter: drop-shadow(0 0 4px #00E5FF); } }
    @keyframes tick-fast { 0%, 100% { fill: #161b22; } 50% { fill: #ff6b6b; filter: drop-shadow(0 0 4px #ff6b6b); } }

    .t1 { animation: tick-1 4s infinite ease-in-out; }
    .t2 { animation: tick-2 3s infinite ease-in-out; }
    .t3 { animation: tick-3 2s infinite ease-in-out; }
    .tf { animation: tick-fast 1s infinite steps(2); }
  </style>
  
  <rect class="bg" width="420" height="220" />
  
  <!-- Header -->
  <text class="panel-title" x="30" y="35">BINARY ATOMIC CLOCK (IST)</text>
  
  <!-- Clock Dot Matrix Grid -->
  <g transform="translate(110, 60)">
    <!-- Column 1 (Hours H1) -->
    <rect class="dot" x="0" y="40" width="22" height="22" />
    <rect class="dot t1" x="0" y="80" width="22" height="22" />
    
    <!-- Column 2 (Hours H2) -->
    <rect class="dot t2" x="35" y="0" width="22" height="22" />
    <rect class="dot" x="35" y="40" width="22" height="22" />
    <rect class="dot t3" x="35" y="80" width="22" height="22" />
    
    <!-- Column 3 (Minutes M1) -->
    <rect class="dot t1" x="80" y="20" width="22" height="22" />
    <rect class="dot t3" x="80" y="50" width="22" height="22" />
    <rect class="dot" x="80" y="80" width="22" height="22" />

    <!-- Column 4 (Minutes M2) -->
    <rect class="dot t2" x="115" y="0" width="22" height="22" />
    <rect class="dot" x="115" y="40" width="22" height="22" />
    <rect class="dot t1" x="115" y="80" width="22" height="22" />
    
    <!-- Column 5 (Seconds S1) -->
    <rect class="dot tf" x="160" y="20" width="22" height="22" />
    <rect class="dot" x="160" y="50" width="22" height="22" />
    <rect class="dot tf" x="160" y="80" width="22" height="22" />

    <!-- Column 6 (Seconds S2) -->
    <rect class="dot" x="195" y="0" width="22" height="22" />
    <rect class="dot tf" x="195" y="40" width="22" height="22" />
    <rect class="dot tf" x="195" y="80" width="22" height="22" />
  </g>
</svg>

  <style>
    .bg { fill: #050816; }
    .cube {
      fill: none;
      stroke: rgba(0, 229, 255, 0.12);
      stroke-width: 1.5;
      rx: 3px;
    }
    .active {
      stroke: #00E5FF;
      fill: rgba(0, 229, 255, 0.08);
      filter: drop-shadow(0 0 4px rgba(0, 229, 255, 0.6));
    }
    /* Smooth CSS glass shimmer sweep across the active letters */
    @keyframes shimmer {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.9)); }
    }
    .active {
      animation: shimmer 3s infinite ease-in-out;
    }
    /* Staggered animation delays for the shimmer wave from left to right */
    .c-2, .c-3, .c-4, .c-5, .c-6, .c-7 { animation-delay: 0.1s; }
    .c-9, .c-10, .c-11, .c-12, .c-13, .c-14 { animation-delay: 0.6s; }
    .c-16, .c-17, .c-18, .c-19, .c-20, .c-21 { animation-delay: 1.1s; }
    .c-23, .c-24, .c-25, .c-26, .c-27, .c-28 { animation-delay: 1.6s; }
    .c-30, .c-31, .c-32, .c-33, .c-34, .c-35 { animation-delay: 2.1s; }
  </style>

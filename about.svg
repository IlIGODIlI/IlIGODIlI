<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&amp;display=swap');
    
    .bg {
      fill: #0b0f19;
      stroke: rgba(0, 229, 255, 0.08);
      stroke-width: 1;
      rx: 12px;
    }
    .text-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 500;
      fill: #00E5FF;
      text-anchor: middle;
    }
    .text-body {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      fill: #c9d1d9;
      font-weight: 300;
      text-anchor: middle;
      opacity: 0;
    }
    
    /* Ultra-compatible opacity animation instead of clipPaths */
    @keyframes line-reveal {
      0%, 100% { opacity: 0; }
      10%, 90% { opacity: 1; }
    }
    
    .t1 { animation: line-reveal 9s infinite ease-in-out; animation-delay: 0.5s; }
    .t2 { animation: line-reveal 9s infinite ease-in-out; animation-delay: 3s; }
    .t3 { animation: line-reveal 9s infinite ease-in-out; animation-delay: 5.5s; }
  </style>
  
  <rect class="bg" width="220" height="220" />
  
  <!-- Bio Text Groups -->
  <g transform="translate(110, 60)">
    <!-- Header -->
    <text class="text-title" x="0" y="0">About Me</text>
    
    <!-- Text body blocks cycling -->
    <g transform="translate(0, 40)">
      <!-- Block 1 -->
      <g class="t1">
        <text class="text-body" x="0" y="0">AI enthusiast,</text>
        <text class="text-body" x="0" y="20">backend developer, and</text>
        <text class="text-body" x="0" y="40">lifelong learner.</text>
      </g>
      
      <!-- Block 2 -->
      <g class="t2">
        <text class="text-body" x="0" y="0">Driven by curiosity</text>
        <text class="text-body" x="0" y="20">and creating positive</text>
        <text class="text-body" x="0" y="40">community impact.</text>
      </g>

      <!-- Block 3 -->
      <g class="t3">
        <text class="text-body" x="0" y="0">Building tools that</text>
        <text class="text-body" x="0" y="20">challenge me and</text>
        <text class="text-body" x="0" y="40">help other developers.</text>
      </g>
    </g>
  </g>
</svg>

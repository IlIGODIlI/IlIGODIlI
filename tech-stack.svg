<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&amp;display=swap');
    
    .bg {
      fill: #050816;
      stroke: rgba(0, 229, 255, 0.08);
      stroke-width: 1;
      rx: 12px;
    }
    
    /* Carousel row slide animations */
    @keyframes slide-right {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-340px, 0, 0); }
    }
    @keyframes slide-left {
      0% { transform: translate3d(-340px, 0, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }
    
    .row-1 { animation: slide-right 20s infinite linear; }
    .row-2 { animation: slide-left 20s infinite linear; }
    .row-3 { animation: slide-right 24s infinite linear; }

    .tag-rect {
      fill: #161b22;
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 1;
      rx: 6px;
    }
    .tag-text {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 500;
      fill: #8b949e;
    }
  </style>
  
  <rect class="bg" width="900" height="220" />
  
  <!-- Row 1: Slide Right -->
  <g transform="translate(0, 30)">
    <g class="row-1">
      <!-- Repeated block of tags to ensure infinite seamless loop -->
      <g transform="translate(0, 0)">
        <rect class="tag-rect" x="0" y="0" width="100" height="35" /> <text class="tag-text" x="50" y="22" text-anchor="middle">Python</text>
        <rect class="tag-rect" x="110" y="0" width="100" height="35" /> <text class="tag-text" x="160" y="22" text-anchor="middle">FastAPI</text>
        <rect class="tag-rect" x="220" y="0" width="100" height="35" /> <text class="tag-text" x="270" y="22" text-anchor="middle">Spring Boot</text>
        <rect class="tag-rect" x="330" y="0" width="100" height="35" /> <text class="tag-text" x="380" y="22" text-anchor="middle">MySQL</text>
      </g>
      <g transform="translate(440, 0)">
        <rect class="tag-rect" x="0" y="0" width="100" height="35" /> <text class="tag-text" x="50" y="22" text-anchor="middle">Python</text>
        <rect class="tag-rect" x="110" y="0" width="100" height="35" /> <text class="tag-text" x="160" y="22" text-anchor="middle">FastAPI</text>
        <rect class="tag-rect" x="220" y="0" width="100" height="35" /> <text class="tag-text" x="270" y="22" text-anchor="middle">Spring Boot</text>
        <rect class="tag-rect" x="330" y="0" width="100" height="35" /> <text class="tag-text" x="380" y="22" text-anchor="middle">MySQL</text>
      </g>
      <g transform="translate(880, 0)">
        <rect class="tag-rect" x="0" y="0" width="100" height="35" /> <text class="tag-text" x="50" y="22" text-anchor="middle">Python</text>
        <rect class="tag-rect" x="110" y="0" width="100" height="35" /> <text class="tag-text" x="160" y="22" text-anchor="middle">FastAPI</text>
        <rect class="tag-rect" x="220" y="0" width="100" height="35" /> <text class="tag-text" x="270" y="22" text-anchor="middle">Spring Boot</text>
        <rect class="tag-rect" x="330" y="0" width="100" height="35" /> <text class="tag-text" x="380" y="22" text-anchor="middle">MySQL</text>
      </g>
    </g>
  </g>

  <!-- Row 2: Slide Left -->
  <g transform="translate(0, 90)">
    <g class="row-2">
      <g transform="translate(0, 0)">
        <rect class="tag-rect" x="0" y="0" width="100" height="35" /> <text class="tag-text" x="50" y="22" text-anchor="middle">React</text>
        <rect class="tag-rect" x="110" y="0" width="100" height="35" /> <text class="tag-text" x="160" y="22" text-anchor="middle">Java</text>
        <rect class="tag-rect" x="220" y="0" width="100" height="35" /> <text class="tag-text" x="270" y="22" text-anchor="middle">JavaScript</text>
        <rect class="tag-rect" x="330" y="0" width="100" height="35" /> <text class="tag-text" x="380" y="22" text-anchor="middle">Git</text>
      </g>
      <g transform="translate(440, 0)">
        <rect class="tag-rect" x="0" y="0" width="100" height="35" /> <text class="tag-text" x="50" y="22" text-anchor="middle">React</text>
        <rect class="tag-rect" x="110" y="0" width="100" height="35" /> <text class="tag-text" x="160" y="22" text-anchor="middle">Java</text>
        <rect class="tag-rect" x="220" y="0" width="100" height="35" /> <text class="tag-text" x="270" y="22" text-anchor="middle">JavaScript</text>
        <rect class="tag-rect" x="330" y="0" width="100" height="35" /> <text class="tag-text" x="380" y="22" text-anchor="middle">Git</text>
      </g>
      <g transform="translate(880, 0)">
        <rect class="tag-rect" x="0" y="0" width="100" height="35" /> <text class="tag-text" x="50" y="22" text-anchor="middle">React</text>
        <rect class="tag-rect" x="110" y="0" width="100" height="35" /> <text class="tag-text" x="160" y="22" text-anchor="middle">Java</text>
        <rect class="tag-rect" x="220" y="0" width="100" height="35" /> <text class="tag-text" x="270" y="22" text-anchor="middle">JavaScript</text>
        <rect class="tag-rect" x="330" y="0" width="100" height="35" /> <text class="tag-text" x="380" y="22" text-anchor="middle">Git</text>
      </g>
    </g>
  </g>

  <!-- Row 3: Slide Right -->
  <g transform="translate(0, 150)">
    <g class="row-3">
      <g transform="translate(0, 0)">
        <rect class="tag-rect" x="0" y="0" width="100" height="35" /> <text class="tag-text" x="50" y="22" text-anchor="middle">FastAPI</text>
        <rect class="tag-rect" x="110" y="0" width="100" height="35" /> <text class="tag-text" x="160" y="22" text-anchor="middle">TailwindCSS</text>
        <rect class="tag-rect" x="220" y="0" width="100" height="35" /> <text class="tag-text" x="270" y="22" text-anchor="middle">NodeJS</text>
        <rect class="tag-rect" x="330" y="0" width="100" height="35" /> <text class="tag-text" x="380" y="22" text-anchor="middle">Docker</text>
      </g>
      <g transform="translate(440, 0)">
        <rect class="tag-rect" x="0" y="0" width="100" height="35" /> <text class="tag-text" x="50" y="22" text-anchor="middle">FastAPI</text>
        <rect class="tag-rect" x="110" y="0" width="100" height="35" /> <text class="tag-text" x="160" y="22" text-anchor="middle">TailwindCSS</text>
        <rect class="tag-rect" x="220" y="0" width="100" height="35" /> <text class="tag-text" x="270" y="22" text-anchor="middle">NodeJS</text>
        <rect class="tag-rect" x="330" y="0" width="100" height="35" /> <text class="tag-text" x="380" y="22" text-anchor="middle">Docker</text>
      </g>
      <g transform="translate(880, 0)">
        <rect class="tag-rect" x="0" y="0" width="100" height="35" /> <text class="tag-text" x="50" y="22" text-anchor="middle">FastAPI</text>
        <rect class="tag-rect" x="110" y="0" width="100" height="35" /> <text class="tag-text" x="160" y="22" text-anchor="middle">TailwindCSS</text>
        <rect class="tag-rect" x="220" y="0" width="100" height="35" /> <text class="tag-text" x="270" y="22" text-anchor="middle">NodeJS</text>
        <rect class="tag-rect" x="330" y="0" width="100" height="35" /> <text class="tag-text" x="380" y="22" text-anchor="middle">Docker</text>
      </g>
    </g>
  </g>
</svg>
